services:
  postgres:
    image: postgres:16-alpine
    container_name: vrs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vrs
      POSTGRES_PASSWORD: vrs
      POSTGRES_DB: vrs
    ports:
      - "5435:5432"
    volumes:
      - vrs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrs -d vrs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vrs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vrs-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vrs-postgres-data:
  vrs-redis-data:
